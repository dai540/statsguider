<script>
(function() {
  function mermaidRootPrefix() {
    var path = window.location.pathname.replace(/\\/g, "/");
    if (path.indexOf("/articles/") !== -1 || path.indexOf("/reference/") !== -1) {
      return "../";
    }
    return "";
  }

  function normalizeMermaidBlocks() {
    document.querySelectorAll("pre.mermaid").forEach(function(block) {
      var code = block.querySelector("code");
      if (code) {
        block.textContent = code.textContent;
      }
    });
  }

  function startMermaid() {
    if (!window.mermaid) {
      return;
    }
    normalizeMermaidBlocks();
    window.mermaid.initialize({
      startOnLoad: true,
      securityLevel: "loose",
      theme: "default"
    });
    if (typeof window.mermaid.run === "function") {
      window.mermaid.run({
        querySelector: "pre.mermaid"
      });
    }
  }

  var script = document.createElement("script");
  script.src = mermaidRootPrefix() + "mermaid.min.js";
  script.onload = startMermaid;
  document.head.appendChild(script);
})();
</script>
