template:
  bootstrap: 5
  bootswatch: flatly

development:
  mode: release

url: https://dai540.github.io/statsguider

home:
  title: statsguider
  description: Guided statistical test selection from a data frame, with simple branching, guarded execution, and bilingual tutorials.

repo:
  url:
    home: https://github.com/dai540/statsguider
    source: https://github.com/dai540/statsguider/blob/main
    issue: https://github.com/dai540/statsguider/issues/
    user: https://github.com/

navbar:
  structure:
    left: [intro, reference, articles]
    right: [github, search]
  components:
    intro:
      text: Get Started
      href: index.html
    reference:
      text: Reference
      href: reference/index.html
    github:
      icon: fa-github
      href: https://github.com/dai540/statsguider
      aria-label: GitHub repository

reference:
  - title: Main workflows
    contents:
      - select_test
      - guided_test
      - recommend_test
      - run_test
      - check_design
  - title: Example data
    contents:
      - wet_example

articles:
  - title: Core tutorials
    navbar: Core
    contents:
      - en-start
      - en-functions
      - en-branching
  - title: English tutorials
    navbar: English
    contents:
      - en-examples
  - title: Japanese tutorials
    navbar: Japanese
    contents:
      - ja-start
      - ja-functions
      - ja-branching
      - ja-examples
